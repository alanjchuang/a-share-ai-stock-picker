name = "a_share_stock_selection_workflow"
description = "AgentLoom-style configurable workflow for A-share LLM-assisted stock selection."
version = "1.0.0"
mode = "sequential"

[[steps]]
id = "tool_planner"
name = "自然语言工具规划"
type = "llm_tool_plan"
enabled = true
output_key = "tool_plan"
require_tool_calls = true
prompt = """
你是A股量化选股Workflow的工具规划Agent。请把用户需求拆成 builtin tool calls。

规则：
1. 只能调用系统提供的函数工具，不要直接输出股票名单。
2. 未提及的参数不要传，不要传 null。
3. 指数/行业/题材可以传中文名，后端builtin工具会映射和校验。
4. 默认调用 set_risk_filters 剔除ST、停牌和180日内次新股。
5. 如果用户说PE低于25、ROE大于12%、舆情高于70，请分别调用对应工具，不要自己拼最终JSON。

指数/题材映射：
{{index_aliases_json}}

默认权重：
{{default_weights_json}}

builtin工具定义：
{{builtin_tools_json}}

用户需求：
{{user_text}}
"""

[[steps]]
id = "condition_guard"
name = "Builtin工具执行与风控补全"
type = "builtin_tool_guard"
enabled = true
input_key = "tool_plan"
output_key = "screening_request"

[[steps]]
id = "deterministic_screen"
name = "多因子确定性筛选"
type = "screen"
enabled = true
output_key = "screening_result"
candidate_limit = 80

[[steps]]
id = "web_research"
name = "火山搜索实时资料检索"
type = "web_search"
enabled = true
fallback = "empty_search_context"
output_key = "web_search_context"
search_type = "web"
count = 8
result_limit = 8
candidate_limit = 8
query_template = "{{user_text}} A股 最新 政策 财报 舆情 新闻 候选股：{{candidate_names}}"

[[steps]]
id = "candidate_reviewer"
name = "候选股大模型复核"
type = "llm_candidate_review"
enabled = true
candidate_limit = 20
output_key = "llm_analysis"
prompt = """
你是A股量化研究员 Agent，负责复核多因子筛选结果。

请只输出 JSON，不要输出 Markdown。JSON 字段：
{
  "market_view": "一句话总结当前筛选逻辑与候选池质量",
  "selection_logic": ["要点1", "要点2", "要点3"],
  "risk_notes": ["风险1", "风险2"],
  "watchlist": [
    {
      "ts_code": "股票代码",
      "name": "股票名称",
      "reason": "入选理由",
      "risk": "主要风险",
      "confidence": 0-100
    }
  ],
  "disclaimer": "不构成投资建议"
}

用户原始需求：
{{user_text}}

结构化筛选条件：
{{screening_request_json}}

候选股样本：
{{candidate_rows_json}}

火山搜索实时资料：
{{web_search_context_json}}

请把搜索资料只作为公开信息辅助校验，优先识别利好兑现、政策催化、监管问询、减持、诉讼、业绩预警等风险。不要编造搜索资料中没有出现的事实。
"""
